body:
  text: 簡大王迫暴旱命龜尹羅貞於大夏王自臨卜王向日而立王汗至帶龜尹知王之炙於日而病蓋榦逾夭釐尹知王之病承龜尹速卜高山深溪王以問釐尹高不穀燥甚病驟夢高山深溪吾所得地於呂中者無有名山名溪欲祭於楚邦者乎當蔽而卜之於大夏如孚將祭之釐尹許諾蔽而卜之孚釐尹致命於君王既蔽而卜之孚王曰如孚速祭之吾燥一病釐尹答曰楚邦有常故焉敢殺祭以君王之身殺祭未嘗有王入以告安君與陵尹子高向爲私便人將笑君陵尹釐尹皆持其言以告太宰君聖人且良長子將正於君太宰謂陵尹君入而語僕之言於君王君王之燥從今日以瘥陵尹與釐尹有故乎願聞之太宰言君王元君不以其身變釐尹之常故釐尹爲楚邦之鬼神主不敢以君王之身變亂鬼神之常故夫上帝鬼神高明甚將必知之君王之病將從今日以已令尹子林問於太宰子止爲人臣者亦有爭乎太宰答曰君王元君君善大夫何用爭令尹謂太宰唯必三軍有大事邦家以杌捏社稷以危歟邦家大旱因資智於邦將爲客告太宰乃而謂之君皆楚邦之將軍作色而言於廷王事何王諾將鼓而涉之王夢三閨未啓以告相徙與中余今夕不穀夢若此何相徙中余答君王當以問太宰晉侯彼聖人之子孫將必鼓而涉之此何太宰進答此所謂之旱母帝將命之修諸侯之君之不能治者而刑之以旱夫雖毋旱而百姓移以去邦家此爲君者之刑王仰天啕而泣謂太宰一人不能治政而百姓以絕後太宰遜返進太宰我何爲歲焉熟太宰答如君王修郢郊方若然里君王毋敢栽介蓋相徙中余與五連小子及寵臣皆屬毋敢執澡箑
